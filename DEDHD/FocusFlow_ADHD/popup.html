<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-container">
        <header>
            <h1>DEDHD</h1>
            <div class="status-badge">Active</div>
        </header>

        <main>
            <p class="label">Master Cognitive Load</p>
            <div class="progress-bg">
                <div id="progress-bar"></div>
            </div>
            <p class="percentage"><span id="score-text">0</span>%</p>

            <div class="info-section">
                <div class="info-box">
                    <p class="info-label">Level</p>
                    <p class="info-value" id="level-text">0</p>
                </div>
                <div class="info-box">
                    <p class="info-label">Mode</p>
                    <p class="info-value" id="mode-text">Standby</p>
                </div>
            </div>

            <p class="description" id="description-text">All signals nominal.</p>

            <p class="section-title">Live Signals</p>
            <div id="signal-grid" class="signal-grid"></div>
        </main>

        <footer><p>DEDHD — Neural Augmentation v2.0</p></footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
